name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # URL of the Collegesaurus AI Streamlit app — the floating chat
          # bubble iframes this. Set as a GitHub Actions *variable* (not
          # secret; it's a public URL): Settings → Secrets and variables →
          # Actions → Variables → New repository variable, name `CHAT_URL`,
          # value e.g. `https://collegesaurus-ai.streamlit.app`. If unset,
          # the bubble will 404 in production — unset is fine for now while
          # the Streamlit app isn't deployed yet.
          CHAT_URL: ${{ vars.CHAT_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
